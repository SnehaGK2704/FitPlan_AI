{% extends "base.html" %}

{% block content %}

<div class="container">

<h2>Generate Workout Plan</h2>

<form method="POST">

<label>Goal</label>
<select name="goal">
<option value="Fat Loss">Fat Loss</option>
<option value="Muscle Gain">Muscle Gain</option>
<option value="General Fitness">General Fitness</option>
</select>

<label>Fitness Level</label>
<select name="fitness_level">
<option value="Beginner">Beginner</option>
<option value="Intermediate">Intermediate</option>
<option value="Advanced">Advanced</option>
</select>

<label>Equipment Available</label>

<div class="checkbox-group">
<input type="checkbox" name="equipment" value="None"> None
</div>

<div class="checkbox-group">
<input type="checkbox" name="equipment" value="Dumbbells"> Dumbbells
</div>

<div class="checkbox-group">
<input type="checkbox" name="equipment" value="Resistance Bands"> Resistance Bands
</div>

<div class="checkbox-group">
<input type="checkbox" name="equipment" value="Barbell"> Barbell
</div>

<button type="submit">Generate Plan</button>

</form>

</div>

{% endblock %}
